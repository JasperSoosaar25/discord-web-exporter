name: Update Star Count
on:
  watch:
    types: [started]
  workflow_dispatch: 

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Fetch and Update
        run: |
          # 1. Get current stars
          STARS=$(curl -s https://api.github.com/repos/${{ github.repository }} | jq '.stargazers_count')
          echo "Updating README with $STARS stars"
          
          # 2. Use a safer way to replace just the number between the tags
          # This specifically looks for the line containing the tags
          sed -i "/STAR_COUNT_START/,/STAR_COUNT_END/ s/>.*</>$STARS</" README.md
          
          # 3. Setup git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 4. Push changes if any
          git add README.md
          if git diff --staged --quiet; then
            echo "No change in stars."
          else
            git commit -m "chore: star count updated to $STARS"
            git push
          fi
