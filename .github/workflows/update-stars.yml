name: Update Star Count
on:
  watch:
    types: [started]
  workflow_dispatch: 

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Fetch and Update
        run: |
          # Get current stars from API
          STARS=$(curl -s https://api.github.com/repos/${{ github.repository }} | jq '.stargazers_count')
          
          # Replace the number between the comments
          sed -i "s/.*/$STARS/" README.md

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Only commit if the file actually changed
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes in star count. Skipping commit."
          else
            git commit -m "chore: auto-update star count to $STARS"
            git push
          fi
